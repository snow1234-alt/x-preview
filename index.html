<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>X投稿プレビュー</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f7f9f9;
    color: #0f1419;
    font-size: 15px;
    line-height: 1.4;
  }
  .app {
    max-width: 600px;
    margin: 0 auto;
    padding: 12px;
  }
  h1 {
    font-size: 16px;
    margin: 4px 0 12px;
    color: #536471;
    font-weight: 600;
  }

  /* 入力エリア */
  .editor {
    background: #fff;
    border: 1px solid #eff3f4;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .text-highlight {
    position: relative;
    width: 100%;
  }
  .text-highlight textarea,
  .text-highlight .backdrop {
    width: 100%;
    min-height: 120px;
    margin: 0;
    padding: 0;
    border: none;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: normal;
    line-break: auto;
    box-sizing: border-box;
  }
  .text-highlight textarea {
    position: relative;
    outline: none;
    resize: none;
    overflow: hidden;
    color: #0f1419;
    background: transparent;
    z-index: 1;
  }
  .text-highlight .backdrop {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    color: transparent;
    pointer-events: none;
    overflow: hidden;
  }
  .text-highlight .backdrop .over {
    background: #ffd4d4;
    border-radius: 2px;
  }
  textarea::placeholder { color: #536471; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #eff3f4;
  }
  .file-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    color: #1d9bf0;
    border: none;
    cursor: pointer;
    font-size: 20px;
  }
  .file-btn:hover { background: #e8f5fd; }
  .file-btn:disabled { color: #8ecdf5; cursor: not-allowed; }
  input[type=file] { display: none; }

  .counter {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #536471;
    font-variant-numeric: tabular-nums;
  }
  .counter .num { font-weight: 600; }
  .counter.warn .num { color: #ffd400; }
  .counter.over .num { color: #f4212e; }
  .mode-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    background: #eff3f4;
    color: #536471;
  }
  .mode-badge.long {
    background: #1d9bf0;
    color: #fff;
  }

  /* プレビュー */
  .preview-label {
    font-size: 12px;
    color: #536471;
    margin: 0 4px 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tweet {
    background: #fff;
    border-radius: 16px;
    padding: 10px;
    display: flex;
    gap: 4px;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1d9bf0, #7856ff);
    flex-shrink: 0;
  }
  .tweet-body {
    flex: 1;
    min-width: 0;
  }
  .name-area {
    display: flex;
    flex-direction: column;
    min-width: 0;
    font-size: 15px;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .name { font-weight: 700; color: #0f1419; }
  .handle { color: #536471; font-weight: 400; }
  .tweet-text {
    font-size: 15px;
    line-height: 1.5;
    color: #0f1419;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: normal;
    line-break: auto;
    letter-spacing: 0;
    -webkit-text-size-adjust: 100%;
  }
  .tweet-text.clamped {
    display: -webkit-box;
    -webkit-line-clamp: 10;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .show-more {
    display: inline-block;
    color: #1d9bf0;
    font-size: 15px;
    margin-top: 4px;
    cursor: pointer;
  }
  .show-more:hover { text-decoration: underline; }

  /* 画像レイアウト（X風） */
  .media {
    margin-top: 12px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #eff3f4;
    display: grid;
    gap: 2px;
    aspect-ratio: 16 / 9;
    background: #eff3f4;
  }
  .media.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .media.count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
  .media.count-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .media.count-3 .cell:nth-child(1) { grid-row: 1 / 3; }
  .media.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .cell {
    position: relative;
    overflow: hidden;
    background: #eff3f4;
  }
  .cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .cell .remove {
    position: absolute;
    top: 6px; right: 6px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(15, 20, 25, 0.75);
    color: #fff;
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }

  /* アクション行 */
  .actions {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    color: #536471;
  }
  .action { display: flex; align-items: center; gap: 4px; font-size: 13px; }
  .action svg { vertical-align: middle; }

  /* リセット */
  .reset {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: #fff;
    border: 1px solid #eff3f4;
    border-radius: 999px;
    color: #0f1419;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .reset:active { background: #eff3f4; }

  @media (max-width: 480px) {
    .app { padding: 8px 4px; }
    .text-highlight textarea { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>X投稿プレビュー</h1>

  <div class="editor">
    <div class="text-highlight">
      <div class="backdrop" id="backdrop" aria-hidden="true"></div>
      <textarea id="text" placeholder="いまどうしてる？" autocomplete="off"></textarea>
    </div>
    <div class="toolbar">
      <label class="file-btn" id="fileBtn" title="画像を追加">
        🖼️
        <input type="file" id="file" accept="image/*" multiple>
      </label>
      <div class="counter" id="counter">
        <span class="mode-badge" id="modeBadge">通常</span>
        <span><span class="num" id="count">0</span> / <span id="limit">280</span></span>
      </div>
    </div>
  </div>

  <div class="preview-label">プレビュー</div>
  <div class="tweet">
    <div class="avatar"></div>
    <div class="tweet-body">
      <div class="name-area">
        <span class="name">あなた</span>
        <span class="handle">@you</span>
      </div>
      <div class="tweet-text" id="previewText"></div>
      <div id="showMore" class="show-more" style="display:none">さらに表示</div>
      <div class="media" id="media" style="display:none"></div>
      <div class="actions">
        <span class="action"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1.751 10c.118-5.458 4.581-9.832 10.03-9.832S21.862 4.493 22.009 9.91c.009.349.009.698 0 1.048-.118 5.458-4.581 9.832-10.03 9.832-1.64 0-3.193-.394-4.558-1.088L2.2 21.252l1.475-4.168A10.03 10.03 0 011.751 10z"/></svg></span>
        <span class="action"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2h6v2h-6c-2.209 0-4-1.791-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM19.5 20.12l-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2h-6V4h6c2.209 0 4 1.791 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14z"/></svg></span>
        <span class="action"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C10.068 6.01 8.61 5.44 7.39 5.5 4.845 5.63 3.22 7.68 3.02 9.91c-.19 2.1.63 4.39 2.62 6.44 1.7 1.76 4 3.35 6.36 4.65 2.36-1.3 4.66-2.89 6.36-4.65 1.99-2.05 2.81-4.34 2.62-6.44-.2-2.23-1.83-4.28-4.38-4.41z"/></svg> 14</span>
        <span class="action"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8.75 21V3h2v18h-2zM18.75 21V8h2v13h-2zM13.75 21v-9h2v9h-2zM3.75 21v-5h2v5h-2z"/></svg> 1002</span>
        <span class="action"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z"/></svg></span>
        <span class="action"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"/></svg></span>
      </div>
    </div>
  </div>

  <button class="reset" id="reset">クリア</button>
</div>

<script>
  const textEl = document.getElementById('text');
  const backdropEl = document.getElementById('backdrop');
  const previewEl = document.getElementById('previewText');
  const countEl = document.getElementById('count');
  const limitEl = document.getElementById('limit');
  const counterEl = document.getElementById('counter');
  const modeBadge = document.getElementById('modeBadge');
  const showMoreEl = document.getElementById('showMore');
  const mediaEl = document.getElementById('media');
  const fileInput = document.getElementById('file');
  const resetBtn = document.getElementById('reset');

  const NORMAL_LIMIT = 280;
  const LONG_LIMIT = 25000;
  const STORAGE_KEY = 'x-preview-draft-v1';

  let images = [];
  let expanded = false;

  const URL_RE = /https?:\/\/[^\s]+/g;

  function charWeight(cp) {
    if (
      (cp >= 0 && cp <= 4351) ||
      (cp >= 8192 && cp <= 8205) ||
      (cp >= 8208 && cp <= 8223) ||
      (cp >= 8242 && cp <= 8247)
    ) return 1;
    return 2;
  }

  function xWeight(text) {
    const normalized = text.replace(URL_RE, 'x'.repeat(23));
    let w = 0;
    for (const ch of normalized) {
      w += charWeight(ch.codePointAt(0));
    }
    return w;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function renderBackdrop(text, limit) {
    const chars = [...text];
    let weight = 0;
    let overStart = -1;
    let i = 0;
    while (i < chars.length) {
      const rest = chars.slice(i).join('');
      const urlMatch = rest.match(/^https?:\/\/[^\s]+/);
      let consumed, addWeight;
      if (urlMatch) {
        consumed = [...urlMatch[0]].length;
        addWeight = 23;
      } else {
        consumed = 1;
        addWeight = charWeight(chars[i].codePointAt(0));
      }
      if (overStart === -1 && weight + addWeight > limit) {
        overStart = i;
      }
      weight += addWeight;
      i += consumed;
    }
    if (overStart === -1) {
      backdropEl.textContent = text;
    } else {
      const safe = chars.slice(0, overStart).join('');
      const over = chars.slice(overStart).join('');
      backdropEl.innerHTML = escapeHtml(safe) + '<span class="over">' + escapeHtml(over) + '</span>';
    }
  }

  function updatePreview() {
    const text = textEl.value;
    previewEl.textContent = text;

    const len = xWeight(text);
    countEl.textContent = len;

    textEl.style.height = 'auto';
    textEl.style.height = Math.max(120, textEl.scrollHeight) + 'px';

    try { localStorage.setItem(STORAGE_KEY, text); } catch (e) {}

    const isLong = len > NORMAL_LIMIT;
    const limit = isLong ? LONG_LIMIT : NORMAL_LIMIT;
    limitEl.textContent = limit.toLocaleString();

    counterEl.classList.remove('warn', 'over');
    if (isLong) {
      modeBadge.textContent = '長文投稿';
      modeBadge.classList.add('long');
      if (len > LONG_LIMIT) counterEl.classList.add('over');
    } else {
      modeBadge.textContent = '通常';
      modeBadge.classList.remove('long');
      if (len >= NORMAL_LIMIT - 20) counterEl.classList.add('warn');
    }

    renderBackdrop(text, NORMAL_LIMIT);

    if (isLong && !expanded) {
      previewEl.classList.add('clamped');
      showMoreEl.style.display = 'inline-block';
      showMoreEl.textContent = 'さらに表示';
    } else if (isLong && expanded) {
      previewEl.classList.remove('clamped');
      showMoreEl.style.display = 'inline-block';
      showMoreEl.textContent = '閉じる';
    } else {
      previewEl.classList.remove('clamped');
      showMoreEl.style.display = 'none';
    }
  }

  function renderMedia() {
    mediaEl.innerHTML = '';
    if (images.length === 0) {
      mediaEl.style.display = 'none';
      return;
    }
    mediaEl.style.display = 'grid';
    mediaEl.className = 'media count-' + images.length;
    images.forEach((src, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const img = document.createElement('img');
      img.src = src;
      const btn = document.createElement('button');
      btn.className = 'remove';
      btn.textContent = '×';
      btn.addEventListener('click', () => {
        images.splice(i, 1);
        renderMedia();
      });
      cell.appendChild(img);
      cell.appendChild(btn);
      mediaEl.appendChild(cell);
    });
  }

  textEl.addEventListener('input', updatePreview);

  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      if (images.length >= 4) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        images.push(ev.target.result);
        renderMedia();
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  });

  showMoreEl.addEventListener('click', () => {
    expanded = !expanded;
    updatePreview();
  });

  resetBtn.addEventListener('click', () => {
    textEl.value = '';
    images = [];
    expanded = false;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    renderMedia();
    updatePreview();
    textEl.focus();
  });

  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) textEl.value = saved;
  } catch (e) {}

  updatePreview();
</script>
</body>
</html>
